name: Build desktop clients

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-13
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build client
        run: python build_client.py

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          Compress-Archive -Path dist\* -DestinationPath artifacts\RobloxAssetDownloader-windows-$env:RUNNER_ARCH.zip

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent dist/RobloxAssetDownloader.app "artifacts/RobloxAssetDownloader-macos-${RUNNER_ARCH}.zip" || \
          ditto -c -k --sequesterRsrc --keepParent dist/RobloxAssetDownloader "artifacts/RobloxAssetDownloader-macos-${RUNNER_ARCH}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RobloxAssetDownloader-${{ runner.os }}-${{ runner.arch }}
          path: artifacts/*
